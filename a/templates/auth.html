<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Portal</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#121212;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:400px;
    background:#1e1e1e;
    border-radius:12px;
    padding:30px;
    box-shadow:0 0 20px rgba(0,0,0,.4);
}

.tabs{
    display:flex;
    margin-bottom:20px;
}

.tab{
    flex:1;
    padding:12px;
    border:none;
    background:#2c2c2c;
    color:white;
    cursor:pointer;
}

.tab.active{
    background:#4f46e5;
}

.form{
    display:none;
}

.form.active{
    display:block;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border:none;
    border-radius:6px;
    background:#2b2b2b;
    color:white;
}

button.submit{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#4f46e5;
    color:white;
    cursor:pointer;
}

button.submit:hover{
    opacity:.9;
}

.error{
    color:#ff6b6b;
    text-align:center;
    margin-top:10px;
}

</style>

</head>

<body>
<h1>TEST DEPLOY 123</h1>
<div class="container">


<div class="tabs">
    <button class="tab active" onclick="showLogin()">
        Sign In
    </button>

    <button class="tab" onclick="showSignup()">
        Sign Up
    </button>
</div>

<form
    id="loginForm"
    class="form active"
    method="post"
    action="/login/"
>

    {% csrf_token %}

    <h2>Sign In</h2>

    <input
        type="text"
        name="username"
        placeholder="Username"
        required>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required>

    <button class="submit" type="submit">
        Sign In
    </button>

</form>

<form
    id="signupForm"
    class="form"
    method="post"
    action="/register/"
>

    {% csrf_token %}

    <h2>Create Account</h2>

    <input
        type="text"
        name="username"
        placeholder="Username"
        required>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required>

    <button class="submit" type="submit">
        Create Account
    </button>

</form>


</div>

<script>

const tabs = document.querySelectorAll(".tab");

function showLogin(){

    tabs[0].classList.add("active");
    tabs[1].classList.remove("active");

    document
        .getElementById("loginForm")
        .classList.add("active");

    document
        .getElementById("signupForm")
        .classList.remove("active");
}

function showSignup(){

    tabs[1].classList.add("active");
    tabs[0].classList.remove("active");

    document
        .getElementById("signupForm")
        .classList.add("active");

    document
        .getElementById("loginForm")
        .classList.remove("active");
}

</script>

</body>
</html>
